<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tarif Defterim</title>
  <meta name="theme-color" content="#E85D26" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tarif Defterim" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FDF8F3; --card: #FFFFFF; --text: #2A1A0E; --text2: #7A5C44;
      --text3: #B89B85; --accent: #E85D26; --border: #EDE4D8;
      --tag-bg: #FFF0E6; --tag-text: #C04A1B;
      --green: #2D7A4F; --green-bg: #E6F5EC;
      --radius: 16px; --shadow: 0 2px 16px rgba(232,93,38,0.08);
    }
    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overscroll-behavior: none; }

    /* LOADING */
    #loadingScreen { position: fixed; inset: 0; z-index: 999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    .loading-logo { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--accent); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* AUTH */
    #authScreen { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
    .auth-card { background: var(--card); border-radius: 24px; border: 1.5px solid var(--border); padding: 32px 24px; width: 100%; max-width: 400px; }
    .auth-logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 4px; }
    .auth-sub { text-align: center; color: var(--text3); font-size: 14px; margin-bottom: 28px; }
    .auth-tabs { display: flex; margin-bottom: 24px; border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    .auth-tab { flex: 1; padding: 11px; background: none; border: none; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--text3); transition: all 0.2s; }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); font-size: 15px; color: var(--text); font-family: 'Nunito', sans-serif; outline: none; transition: border-color 0.2s; }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-error { background: #FEE; border: 1px solid #FCC; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #C00; display: none; }
    .auth-success { background: var(--green-bg); border: 1px solid var(--green); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--green); display: none; text-align: center; }

    /* TOPBAR */
    .topbar { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1.5px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .topbar-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .topbar-title span { color: var(--text); }
    .topbar-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .btn-add { background: var(--accent); color: #fff; border: none; border-radius: 50px; padding: 8px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 4px; }
    .btn-add svg { width: 15px; height: 15px; }
    .btn-icon { background: var(--tag-bg); border: 1.5px solid var(--border); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--accent); font-weight: 700; flex-shrink: 0; }

    /* SEARCH + SORT */
    .search-area { padding: 12px 16px 4px; display: flex; gap: 8px; }
    .search-wrap { position: relative; flex: 1; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 16px; height: 16px; }
    .search-input { width: 100%; padding: 10px 14px 10px 36px; border: 1.5px solid var(--border); border-radius: 50px; background: var(--card); font-size: 14px; color: var(--text); font-family: 'Nunito', sans-serif; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .sort-wrap { position: relative; }
    .sort-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 50px; padding: 10px 12px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
    .sort-dropdown { position: absolute; top: calc(100% + 4px); right: 0; background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); z-index: 150; overflow: hidden; min-width: 170px; display: none; }
    .sort-option { padding: 11px 16px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; font-family: 'Nunito', sans-serif; }
    .sort-option.active { color: var(--accent); font-weight: 700; }

    /* CATS */
    .cats { display: flex; gap: 7px; overflow-x: auto; padding: 6px 16px; scrollbar-width: none; }
    .cats::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 6px 13px; border-radius: 50px; border: 1.5px solid var(--border); background: var(--card); font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; font-family: 'Nunito', sans-serif; display: flex; align-items: center; gap: 5px; }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .cat-count { background: var(--border); color: var(--text3); border-radius: 50px; padding: 1px 6px; font-size: 11px; }
    .cat-btn.active .cat-count { background: rgba(255,255,255,0.3); color: #fff; }

    /* TAGS BAR */
    .tags-bar { display: flex; gap: 6px; overflow-x: auto; padding: 2px 16px 6px; scrollbar-width: none; min-height: 0; }
    .tags-bar::-webkit-scrollbar { display: none; }
    .tag-filter-btn { flex-shrink: 0; padding: 4px 12px; border-radius: 50px; border: 1.5px solid var(--border); background: var(--card); font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; font-family: 'Nunito', sans-serif; }
    .tag-filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* RESULTS BAR */
    .results-bar { padding: 2px 16px 0; display: flex; justify-content: space-between; align-items: center; }
    .results-count { font-size: 12px; color: var(--text3); font-weight: 600; }
    .random-btn { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--accent); font-family: 'Nunito', sans-serif; }

    /* RECIPE LIST + CARD */
    .recipe-list { padding: 8px 16px 20px; display: flex; flex-direction: column; gap: 11px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state .big { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }
    .recipe-card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; transition: transform 0.15s; }
    .recipe-card:active { transform: scale(0.985); }
    .recipe-card-body { padding: 14px; }
    .recipe-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .recipe-card-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.3; flex: 1; }
    .recipe-card-actions { display: flex; gap: 3px; margin-left: 8px; flex-shrink: 0; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 5px; border-radius: 8px; color: var(--text3); }
    .icon-btn.fav.active { color: var(--accent); }
    .icon-btn svg { width: 19px; height: 19px; display: block; }
    .recipe-card-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 7px; }
    .meta-item { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--text3); font-weight: 600; }
    .meta-item svg { width: 12px; height: 12px; }
    .recipe-card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
    .recipe-card-footer { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .recipe-tag { display: inline-block; padding: 3px 10px; background: var(--tag-bg); color: var(--tag-text); border-radius: 50px; font-size: 11px; font-weight: 700; }
    .recipe-etag { display: inline-block; padding: 3px 10px; background: var(--green-bg); color: var(--green); border-radius: 50px; font-size: 11px; font-weight: 700; }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 16px 100px; flex-wrap: wrap; }
    .page-btn { padding: 7px 14px; border-radius: 50px; border: 1.5px solid var(--border); background: var(--card); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; color: var(--text2); cursor: pointer; }
    .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: var(--text3); }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1.5px solid var(--border); display: flex; padding: 6px 0 env(safe-area-inset-bottom, 6px); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; cursor: pointer; padding: 6px 2px; color: var(--text3); font-size: 10px; font-weight: 600; font-family: 'Nunito', sans-serif; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(42,26,14,0.45); align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 24px 24px 0 0; width: 100%; max-height: 93vh; overflow-y: auto; padding: 0 0 env(safe-area-inset-bottom, 16px); animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px 10px; border-bottom: 1.5px solid var(--border); }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: var(--text); }
    .btn-close { background: var(--border); border: none; cursor: pointer; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text2); flex-shrink: 0; }
    .btn-close svg { width: 16px; height: 16px; }

    /* FORM */
    .form-body { padding: 16px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-input, .form-select, .form-textarea { width: 100%; padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); font-size: 14px; color: var(--text); font-family: 'Nunito', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    .ingredient-list { display: flex; flex-direction: column; gap: 7px; margin-bottom: 7px; }
    .ingredient-item { display: flex; align-items: center; gap: 7px; }
    .ingredient-item .form-input { flex: 1; }
    .btn-remove { background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px; flex-shrink: 0; }
    .btn-remove svg { width: 18px; height: 18px; }
    .btn-add-ing { background: none; border: 1.5px dashed var(--border); border-radius: 10px; padding: 9px; width: 100%; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600; color: var(--text3); }
    .btn-save { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 14px; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

    /* TAGS INPUT */
    .tags-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--bg); min-height: 44px; cursor: text; }
    .tag-chip { display: flex; align-items: center; gap: 4px; padding: 3px 10px; background: var(--green-bg); color: var(--green); border-radius: 50px; font-size: 12px; font-weight: 700; }
    .tag-chip button { background: none; border: none; cursor: pointer; color: var(--green); font-size: 14px; line-height: 1; padding: 0 0 1px; }
    .tags-text-input { border: none; background: none; outline: none; font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--text); flex: 1; min-width: 80px; padding: 2px; }

    /* DETAIL */
    .detail-hero { background: linear-gradient(135deg, #FFF0E6 0%, #FDE8D4 100%); padding: 24px 16px 20px; text-align: center; }
    .detail-emoji { font-size: 56px; margin-bottom: 10px; }
    .detail-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .detail-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 8px; }
    .detail-meta-row { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
    .detail-meta-item { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .detail-meta-item svg { width: 18px; height: 18px; color: var(--accent); }
    .detail-meta-item .val { font-size: 15px; font-weight: 700; color: var(--text); }
    .detail-meta-item .lbl { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-body { padding: 16px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 12px; margin-top: 20px; display: flex; align-items: center; gap: 8px; }
    .section-title:first-child { margin-top: 0; }
    .section-title::after { content: ''; flex: 1; height: 1.5px; background: var(--border); }
    .ing-chip { display: inline-flex; padding: 6px 12px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 50px; font-size: 13px; color: var(--text); margin: 0 5px 7px 0; }
    .steps-list { list-style: none; }
    .step-item { display: flex; gap: 12px; margin-bottom: 15px; align-items: flex-start; }
    .step-num { flex-shrink: 0; width: 30px; height: 30px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .step-text { font-size: 14px; color: var(--text2); line-height: 1.6; padding-top: 4px; }
    .detail-note { background: var(--green-bg); border-left: 3px solid var(--green); border-radius: 0 12px 12px 0; padding: 12px 14px; font-size: 13px; color: var(--green); line-height: 1.6; }

    /* STATS */
    .stats-header { padding: 16px 16px 8px; }
    .stats-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .stats-sub { font-size: 13px; color: var(--text3); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 16px; }
    .stat-card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); padding: 14px; text-align: center; }
    .stat-num { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 11px; color: var(--text3); font-weight: 600; margin-top: 4px; }

    /* SHOPPING */
    .shop-section-title { padding: 10px 16px 4px; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; background: var(--bg); }
    .shop-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .shop-item input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); flex-shrink: 0; cursor: pointer; }
    .shop-item label { font-size: 14px; color: var(--text); cursor: pointer; flex: 1; }
    .shop-item.done label { text-decoration: line-through; color: var(--text3); }

    /* IMPORT */
    .imp-item { background: var(--bg); border: 1.5px solid var(--border); border-radius: 14px; padding: 13px; margin-bottom: 10px; }
    .imp-check { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .imp-check input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .imp-title { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .imp-meta { font-size: 12px; color: var(--text3); }
    .btn-import { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 14px; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
    .btn-import:disabled { opacity: 0.6; cursor: not-allowed; }
    .imp-progress { text-align: center; padding: 40px 20px; color: var(--text3); }
    .imp-progress .big { font-size: 48px; margin-bottom: 12px; }
    .imp-progress p { font-size: 14px; line-height: 1.6; }

    /* RANDOM */
    .random-card { padding: 24px 20px; text-align: center; }
    .random-emoji { font-size: 64px; margin-bottom: 12px; }
    .random-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .random-meta { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
    .random-btns { display: flex; gap: 10px; }
    .random-btns button { flex: 1; padding: 12px; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); background: var(--card); color: var(--text2); }
    .random-btns button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* PROFILE */
    .profile-info { padding: 20px; text-align: center; }
    .profile-avatar { width: 60px; height: 60px; background: var(--tag-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 700; color: var(--accent); margin: 0 auto 10px; }
    .profile-email { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
    .btn-logout { width: 100%; padding: 13px; background: none; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: var(--text2); cursor: pointer; }

    .screen { display: none; }
    .screen.active { display: block; }
    .toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: #2A1A0E; color: #fff; padding: 11px 22px; border-radius: 50px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="loading-logo">🍽 Tarif Defterim</div>
  <div class="spinner"></div>
</div>

<!-- AUTH -->
<div id="authScreen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">🍽 Tarif Defterim</div>
    <div class="auth-sub">Kişisel dijital tarif defteriniz</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Giriş Yap</button>
      <button class="auth-tab" onclick="switchTab('register')">Kayıt Ol</button>
    </div>
    <div class="auth-form">
      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>
      <input class="auth-input" type="email" id="authEmail" placeholder="E-posta adresiniz" />
      <input class="auth-input" type="password" id="authPassword" placeholder="Şifreniz (en az 6 karakter)" />
      <button class="auth-btn" id="authBtn" onclick="handleAuth()">Giriş Yap</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appShell" style="display:none;">

  <!-- ANA SAYFA -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div class="topbar-title">Tarif <span>Defterim</span></div>
      <div class="topbar-right">
        <button class="btn-add" onclick="openAddModal()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>Ekle
        </button>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient('https://doaeylatedhpnwqqtvpb.supabase.co','sb_publishable_tRsM1gq-b2Pfa9Rh9uXpoA_G2U1BNFJ');

const catEmoji = {'Sabah Kahvaltısı':'🍳','Çorba':'🍜','Ana Yemek':'🍽','Salata':'🥗','Tatlı':'🍰','İçecek':'🧃','Diğer':'🍴'};
const PAGE_SIZE = 20;

let recipes=[], currentCat='', currentTag='', currentSort='new', currentPage=1;
let editingId=null, detailId=null, currentUser=null, authMode='login';
let formTags=[], importList=[], searchTimer=null;
let shopItems = JSON.parse(localStorage.getItem('shopItems')||'[]');

// ── INIT ──
async function init() {
  // Önce localStorage'dan session oku (hızlı)
  try {
    const raw = localStorage.getItem('sb-doaeylatedhpnwqqtvpb-auth-token');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.user) {
        currentUser = parsed.user;
        document.getElementById('loadingScreen').style.display = 'none';
        showApp();
        await fetchRecipes();
        // Arka planda SDK session'ı da yenile
        sb.auth.getSession().catch(()=>{});
        return;
      }
    }
  } catch(e) {}

  // localStorage'da yoksa SDK'dan dene
  const timeout = setTimeout(() => {
    document.getElementById('loadingScreen').style.display = 'none';
    showAuth();
  }, 5000);
  try {
    const { data: { session } } = await sb.auth.getSession();
    clearTimeout(timeout);
    currentUser = session?.user || null;
    document.getElementById('loadingScreen').style.display = 'none';
    if (currentUser) { showApp(); await fetchRecipes(); } else showAuth();
  } catch(e) {
    clearTimeout(timeout);
    document.getElementById('loadingScreen').style.display = 'none';
    showAuth();
  }
}

sb.auth.onAuthStateChange(async (ev, session) => {
  if (ev === 'SIGNED_OUT') { currentUser = null; recipes = []; showAuth(); }
  else if (ev === 'SIGNED_IN' && session?.user) { currentUser = session.user; }
});

function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  const l = (currentUser?.email||'?')[0].toUpperCase();
  document.getElementById('userAvatar').textContent = l;
  document.getElementById('profileAvatar').textContent = l;
  document.getElementById('profileEmail').textContent = currentUser?.email||'';
}
function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appShell').style.display = 'none';
}

// ── AUTH ──
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='register')));
  document.getElementById('authBtn').textContent = mode==='login'?'Giriş Yap':'Kayıt Ol';
  document.getElementById('authError').style.display='none';
  document.getElementById('authSuccess').style.display='none';
}

async function handleAuth() {
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPassword').value;
  const btn=document.getElementById('authBtn');
  document.getElementById('authError').style.display='none';
  document.getElementById('authSuccess').style.display='none';
  if(!email||!pass){showAuthErr('E-posta ve şifre gereklidir.');return;}
  if(pass.length<6){showAuthErr('Şifre en az 6 karakter olmalıdır.');return;}
  btn.disabled=true; btn.textContent='⏳ Bekleyin...';
  if(authMode==='login'){
    const {data, error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showAuthErr(trErr(error.message));btn.disabled=false;btn.textContent='Giriş Yap';}
    else {
      // SDK yavaş olsa bile localStorage'dan okuyarak direkt gir
      currentUser = data?.user || null;
      if(!currentUser){
        // Kısa bekle, localStorage'a yazılsın
        await new Promise(r=>setTimeout(r,500));
        try{const raw=localStorage.getItem('sb-doaeylatedhpnwqqtvpb-auth-token');if(raw)currentUser=JSON.parse(raw)?.user;}catch(e){}
      }
      btn.disabled=false; btn.textContent='Giriş Yap';
      if(currentUser){showApp();await fetchRecipes();}
    }
  } else {
    const {error}=await sb.auth.signUp({email,password:pass});
    if(error){showAuthErr(trErr(error.message));btn.disabled=false;btn.textContent='Kayıt Ol';}
    else{document.getElementById('authSuccess').textContent='✅ Kayıt başarılı! E-postanıza onay linki gönderdik.';document.getElementById('authSuccess').style.display='block';btn.disabled=false;btn.textContent='Kayıt Ol';}
  }
}
function showAuthErr(m){const e=document.getElementById('authError');e.textContent=m;e.style.display='block';}
function trErr(m){
  if(m.includes('Invalid login'))return'E-posta veya şifre hatalı.';
  if(m.includes('Email not confirmed'))return'E-postanızı onaylamadınız.';
  if(m.includes('already registered'))return'Bu e-posta zaten kayıtlı.';
  return m;
}
async function logout(){
  await sb.auth.signOut();
  // localStorage'daki session'ı da temizle
  localStorage.removeItem('sb-doaeylatedhpnwqqtvpb-auth-token');
  currentUser = null;
  recipes = [];
  closeProfile();
  showAuth();
  toast('👋 Çıkış yapıldı');
}
function openProfile(){document.getElementById('profileOverlay').classList.add('open');}
function closeProfile(){document.getElementById('profileOverlay').classList.remove('open');}
function handleProfileOverlay(e){if(e.target===document.getElementById('profileOverlay'))closeProfile();}

// ── DATA ──
async function fetchRecipes() {
  if(!currentUser)return;
  const {data,error}=await sb.from('recipes').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false});
  if(error){toast('⚠️ Veriler yüklenemedi');return;}
  recipes=data||[];
  updateCounts(); updateTagsBar(); renderList();
}

// ── SCREENS ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='favs')renderFavs();
  if(name==='stats')renderStats();
  if(name==='shop')renderShop();
}

// ── SORT ──
function toggleSort(){const d=document.getElementById('sortDropdown');d.style.display=d.style.display==='block'?'none':'block';}
function setSort(val,label){
  currentSort=val; currentPage=1;
  document.getElementById('sortLabel').textContent=label;
  document.querySelectorAll('.sort-option').forEach(o=>o.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('sortDropdown').style.display='none';
  renderList();
}
document.addEventListener('click',e=>{if(!e.target.closest('.sort-wrap'))document.getElementById('sortDropdown').style.display='none';});

// ── FILTER & SORT ──
function onSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>{currentPage=1;renderList();},200);}

function setCat(btn,cat){
  currentCat=cat;currentPage=1;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderList();
}

function setTag(tag){
  currentTag=currentTag===tag?'':tag;
  currentPage=1;updateTagsBar();renderList();
}

function getFiltered(){
  const q=(document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  let items=recipes.filter(r=>{
    const mc=!currentCat||r.category===currentCat;
    const mt=!currentTag||(r.tags||[]).includes(currentTag);
    const mq=!q||r.name.toLowerCase().includes(q)||(r.ingredients||[]).some(i=>i.toLowerCase().includes(q))||(r.tags||[]).some(t=>t.toLowerCase().includes(q));
    return mc&&mt&&mq;
  });
  if(currentSort==='alpha')items.sort((a,b)=>a.name.localeCompare(b.name,'tr'));
  else if(currentSort==='alpha_desc')items.sort((a,b)=>b.name.localeCompare(a.name,'tr'));
  else if(currentSort==='time')items.sort((a,b)=>(a.time_minutes||9999)-(b.time_minutes||9999));
  else if(currentSort==='fav')items.sort((a,b)=>(b.is_favorite?1:0)-(a.is_favorite?1:0));
  return items;
}

// ── COUNTS & TAGS ──
function updateCounts(){
  const c={};
  recipes.forEach(r=>{c[r.category]=(c[r.category]||0)+1;});
  document.getElementById('cnt-all').textContent=recipes.length;
  document.getElementById('cnt-k').textContent=c['Sabah Kahvaltısı']||0;
  document.getElementById('cnt-c').textContent=c['Çorba']||0;
  document.getElementById('cnt-a').textContent=c['Ana Yemek']||0;
  document.getElementById('cnt-s').textContent=c['Salata']||0;
  document.getElementById('cnt-t').textContent=c['Tatlı']||0;
  document.getElementById('cnt-i').textContent=c['İçecek']||0;
  document.getElementById('cnt-d').textContent=c['Diğer']||0;
}

function getAllTags(){
  const s=new Set();
  recipes.forEach(r=>(r.tags||[]).forEach(t=>s.add(t)));
  return[...s].sort();
}

function updateTagsBar(){
  const tags=getAllTags();
  const bar=document.getElementById('tagsBar');
  if(!tags.length){bar.innerHTML='';return;}
  bar.innerHTML=tags.map(t=>`<button class="tag-filter-btn ${currentTag===t?'active':''}" onclick="setTag('${esc(t)}')">#${esc(t)}</button>`).join('');
}

// ── RENDER ──
function cardHTML(r){
  const tags=(r.tags||[]).map(t=>`<span class="recipe-etag">#${esc(t)}</span>`).join('');
  return`<div class="recipe-card" onclick="openDetail('${r.id}')">
    <div class="recipe-card-body">
      <div class="recipe-card-header">
        <div class="recipe-card-title">${r.emoji||catEmoji[r.category]||'🍴'} ${esc(r.name)}</div>
        <div class="recipe-card-actions">

function renderList(){
  const filtered=getFiltered();
  const total=filtered.length;
  const totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(currentPage>totalPages)currentPage=totalPages;
  const pageItems=filtered.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);
  document.getElementById('resultsCount').textContent=total?`${total} tarif`:'';
  const list=document.getElementById('recipeList');
  if(!pageItems.length){
    list.innerHTML=`<div class="empty-state"><div class="big">🍳</div><p>${recipes.length===0?'Henüz tarif yok.<br>İlk tarifinizi ekleyin!':'Arama sonucu bulunamadı.'}</p></div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }
  list.innerHTML=pageItems.map(r=>cardHTML(r)).join('');
  renderPagination(currentPage,totalPages);
}

function renderPagination(page,total){
  const pg=document.getElementById('pagination');
  if(total<=1){pg.innerHTML='';return;}
  let html=`<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  const s=Math.max(1,page-2),e=Math.min(total,page+2);
  if(s>1)html+=`<button class="page-btn" onclick="goPage(1)">1</button>${s>2?'<span class="page-info">…</span>':''}`;
  for(let i=s;i<=e;i++)html+=`<button class="page-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if(e<total)html+=`${e<total-1?'<span class="page-info">…</span>':''}<button class="page-btn" onclick="goPage(${total})">${total}</button>`;
  html+=`<button class="page-btn" onclick="goPage(${page+1})" ${page===total?'disabled':''}>›</button>`;
  pg.innerHTML=html;
}

function goPage(p){currentPage=p;renderList();window.scrollTo(0,0);}

  const tagTxt=document.getElementById('tagTxt');

    name,category:document.getElementById('fCat').value,
    emoji:document.getElementById('fEmoji').value.trim()||null,
    time_minutes:parseInt(document.getElementById('fTime').value)||null,
    servings:parseInt(document.getElementById('fServ').value)||null,

    steps:document.getElementById('fSteps').value.trim()||null,
    note:document.getElementById('fNote').value.trim()||null,
    tags:formTags,
  };
  let error;
  if(editingId){

    if(!error){const idx=recipes.findIndex(r=>r.id===editingId);if(idx>-1)recipes[idx]={...recipes[idx],...payload};}
  } else {
    payload.user_id=currentUser.id;payload.is_favorite=false;
    const {data,error:e}=await sb.from('recipes').insert(payload).select().single();
    error=e;if(!error&&data)recipes.unshift(data);

  if(error){toast('⚠️ Kaydedilemedi: '+error.message);return;}
  closeModal();updateCounts();updateTagsBar();renderList();

}

let importList2=[];

function closeImport(){document.getElementById('importOverlay').classList.remove('open');}

async function handleFileImport(event){
  const file=event.target.files[0];event.target.value='';if(!file)return;
  document.getElementById('importTitle').textContent='📄 Dosyadan Aktar';
  document.getElementById('importBody').innerHTML=`<div class="imp-progress"><div class="big">⏳</div><p>Dosya okunuyor...</p></div>`;
  document.getElementById('importOverlay').classList.add('open');
  try{
    let text='';
    const name=file.name.toLowerCase();
    if(name.endsWith('.html')||name.endsWith('.htm'))text=await extractHtmlText(file);
    else if(name.endsWith('.pdf'))text=await extractPdfText(file);
    else{document.getElementById('importBody').innerHTML=`<div class="imp-progress"><div class="big">😕</div><p>Desteklenmeyen dosya türü.</p></div>`;return;}
    if(!text||text.trim().length<30){document.getElementById('importBody').innerHTML=`<div class="imp-progress"><div class="big">😕</div><p>Dosyadan metin okunamadı.</p></div>`;return;}
    importList2=parseRecipesFromText(text);
    if(!importList2.length){document.getElementById('importBody').innerHTML=`<div class="imp-progress"><div class="big">🤔</div><p>Tarif formatı tanınamadı.<br>"01) Tarif Adı" formatı gereklidir.</p></div>`;return;}
    renderImportList();
  }catch(err){document.getElementById('importBody').innerHTML=`<div class="imp-progress"><div class="big">⚠️</div><p>Hata: ${esc(err.message)}</p></div>`;}
}

async function extractHtmlText(file){
  const html=await file.text();
  const parser=new DOMParser();
  const doc=parser.parseFromString(html,'text/html');
  doc.querySelectorAll('br').forEach(br=>br.replaceWith('\n'));
  doc.querySelectorAll('p,div,h1,h2,h3,h4,li,tr').forEach(el=>el.insertAdjacentText('afterend','\n'));
  return doc.body?doc.body.innerText||doc.body.textContent:doc.documentElement.textContent;
}

async function extractPdfText(file){
  if(!window.pdfjsLib){
    await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  let txt='';
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();txt+=c.items.map(x=>x.str).join(' ')+'\n';}
  return txt;
}

function parseRecipesFromText(rawText){
  const results=[];
  const lines=rawText.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const titleRe=/^(\d{1,3})[\)\.]\s*(.+)/;
  let blocks=[],current=null;
  for(const line of lines){
    const m=line.match(titleRe);
    if(m){if(current)blocks.push(current);current={title:m[2].trim(),lines:[]};}
    else if(current)current.lines.push(line);
  }
  if(current)blocks.push(current);
  for(const block of blocks){
    let ingredients=[],stepsArr=[],noteArr=[],time_minutes=null,servings=null,mode='';
    for(const line of block.lines){
      if(/^malzeme/i.test(line)||/^içindekiler/i.test(line)){mode='ing';continue;}
      if(/^yapılı|^hazırlanı/i.test(line)){mode='steps';continue;}
      if(/^not:/i.test(line)){mode='note';noteArr.push(line.replace(/^not:\s*/i,'').trim());continue;}
      const tm=line.match(/(\d+)\s*(dakika|dk\.?|saat)/i);
      if(tm)time_minutes=parseInt(tm[1])*(/saat/i.test(tm[2])?60:1);
      const sm=line.match(/(\d+)\s*(kişi|porsiyon|kişilik)/i);
      if(sm)servings=parseInt(sm[1]);
      if(mode==='ing'){const parts=line.replace(/\.\s*$/,'').split(',').map(s=>s.trim()).filter(s=>s.length>0);ingredients.push(...parts);}
      else if(mode==='steps')stepsArr.push(line);
      else if(mode==='note')noteArr.push(line);
    }
    const raw=stepsArr.join(' ').replace(/\s+/g,' ');
    const sents=raw.split(/(?<=[.!?])\s+(?=[A-ZÇĞİÖŞÜİa-zçğışöü])/).map(s=>s.trim()).filter(s=>s.length>3);
    const stepsText=sents.map((s,i)=>`${i+1}. ${s.endsWith('.')?s:s+'.'}`).join('\n');
    if(block.title.length>1&&(ingredients.length>0||stepsText.length>0)){
      results.push({name:block.title,category:guessCategory(block.title+' '+ingredients.join(' ')),emoji:guessEmoji(block.title),time_minutes,servings,ingredients,steps:stepsText,note:noteArr.join(' ').trim()||null,tags:[],is_favorite:false});
    }
  }
  return results;
}

function guessCategory(t){
  t=t.toLowerCase();
  if(/çorba/.test(t))return'Çorba';if(/salata/.test(t))return'Salata';
  if(/tatlı|pasta|kek|kurabiye|baklava|kadayıf|sütlaç/.test(t))return'Tatlı';
  if(/kahvaltı|omlet|yumurta|reçel|börek/.test(t))return'Sabah Kahvaltısı';
  if(/çay|kahve|şerbet|limonata/.test(t))return'İçecek';
  if(/pilav|kebap|köfte|dolma|sarma|güveç|tavuk|balık|makarna/.test(t))return'Ana Yemek';
  return'Diğer';
}
function guessEmoji(n){
  n=n.toLowerCase();
  if(/çorba/.test(n))return'🍜';if(/pilav/.test(n))return'🍚';if(/köfte/.test(n))return'🥩';
  if(/kebap/.test(n))return'🍢';if(/salata/.test(n))return'🥗';if(/tatlı|pasta|kek/.test(n))return'🍰';
  if(/baklava/.test(n))return'🍯';if(/tavuk/.test(n))return'🍗';if(/balık/.test(n))return'🐟';
  if(/makarna/.test(n))return'🍝';if(/börek/.test(n))return'🥐';if(/kahve/.test(n))return'☕';
  if(/çay/.test(n))return'🍵';if(/dolma|sarma/.test(n))return'🌿';return'🍽';
}

function renderImportList(){
  document.getElementById('importTitle').textContent=`📄 ${importList2.length} Tarif Bulundu`;
  document.getElementById('importBody').innerHTML=`
    <p style="font-size:12px;color:var(--text3);margin-bottom:12px;">Aktarmak istediğiniz tarifleri seçin:</p>
    <div>${importList2.map((r,idx)=>`
      <div class="imp-item">
        <label class="imp-check">
          <input type="checkbox" id="ic_${idx}" checked />
          <div><div class="imp-title">${r.emoji} ${esc(r.name)}</div>
          <div class="imp-meta">${r.category}${r.time_minutes?' · ⏱ '+r.time_minutes+' dk':''}${r.ingredients.length?' · '+r.ingredients.length+' malzeme':''}</div></div>
        </label>
      </div>`).join('')}</div>
    <button class="btn-import" id="importBtn" onclick="doImport()">✅ Seçilenleri Aktar</button>`;
}

async function doImport(){
  const btn=document.getElementById('importBtn');
  const selected=importList2.filter((_,idx)=>{const cb=document.getElementById(`ic_${idx}`);return cb&&cb.checked;});
  if(!selected.length){toast('⚠️ En az bir tarif seçin');return;}
  btn.disabled=true;btn.textContent=`⏳ ${selected.length} tarif aktarılıyor...`;
  let ok=0;
  for(const r of selected){
    const {data,error}=await sb.from('recipes').insert({...r,user_id:currentUser.id}).select().single();
    if(!error&&data){recipes.unshift(data);ok++;}
  }
  closeImport();updateCounts();updateTagsBar();renderList();
  toast(`✅ ${ok} tarif başarıyla aktarıldı!`);
}

// ── HELPERS ──
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

init();
